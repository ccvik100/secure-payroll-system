version: '3.8'

services:
  # --- ADATBÁZIS ---
  mongodb:
    image: mongo:8.0
    container_name: payroll_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - payroll_network
    restart: unless-stopped

  # --- 1. NEM SZENZITÍV BACKEND (Directory Service) ---
  directory-service:
    build: 
      context: ./backend/DirectoryService
      dockerfile: Dockerfile.dev # Fejlesztésre optimalizált Dockerfile (dotnet watch)
    container_name: directory_api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=DirectoryDb
    depends_on:
      - mongodb
    networks:
      - payroll_network
    volumes:
      - ./backend/DirectoryService:/app # Kód rácsatolása a valós idejű frissítéshez (hot-reload)

  # --- 2. SZENZITÍV BACKEND (Vault Service) ---
  vault-service:
    build: 
      context: ./backend/VaultService
      dockerfile: Dockerfile.dev
    container_name: vault_api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=VaultDb
      - DirectoryService__BaseUrl=http://directory-service:8080 # Belső hálózati elérés a másik service-hez
    depends_on:
      - mongodb
    networks:
      - payroll_network
    volumes:
      - ./backend/VaultService:/app

  # --- 3. MCP SZERVER ---
  finance-mcp:
    build:
      context: ./backend/FinanceMcp
      dockerfile: Dockerfile.dev
    container_name: finance_mcp_server
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - VaultService__BaseUrl=http://vault-service:8080
    networks:
      - payroll_network
    volumes:
      - ./backend/FinanceMcp:/app

  # --- 4. FRONTEND (Angular) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: payroll_frontend
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true # Fontos Windows/Mac Docker Angular hot-reloadhoz
    networks:
      - payroll_network
    volumes:
      - ./frontend:/app
      - /app/node_modules # Szigeteljük a konténer node_modules mappáját a gazdagéptől

networks:
  payroll_network:
    driver: bridge

volumes:
  mongodb_data: