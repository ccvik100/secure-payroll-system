name: CI Pipeline - Build and Push

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Kód letöltése a szerverre
        uses: actions/checkout@v4

      - name: Bejelentkezés a GitHub Container Registry-be
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Directory API
        uses: docker/build-push-action@v5
        with:
          context: ./backend/DirectoryService
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/payroll-directory:latest

      - name: Build and Push Vault API
        uses: docker/build-push-action@v5
        with:
          context: ./backend/VaultService
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/payroll-vault:latest

      - name: Build and Push Finance MCP
        uses: docker/build-push-action@v5
        with:
          context: ./backend/FinanceMcp
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/payroll-mcp:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/payroll-frontend:latest