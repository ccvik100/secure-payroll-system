apiVersion: apps/v1
kind: Deployment
metadata:
  name: directory-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directory-api
  template:
    metadata:
      labels:
        app: directory-api
    spec:
      containers:
      - name: directory-api
        image: ghcr.io/ccvik100/payroll-directory:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ConnectionStrings__MongoDb
          value: "mongodb://payroll-mongodb:27017"
---
apiVersion: v1
kind: Service
metadata:
  name: directory-api
spec:
  selector:
    app: directory-api
  ports:
  - port: 5001
    targetPort: 8080