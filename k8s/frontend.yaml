apiVersion: apps/v1
kind: Deployment
metadata:
  name: payroll-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payroll-frontend
  template:
    metadata:
      labels:
        app: payroll-frontend
    spec:
      containers:
      - name: payroll-frontend
        image: ghcr.io/ccvik100/payroll-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4200
---
apiVersion: v1
kind: Service
metadata:
  name: payroll-frontend
spec:
  type: NodePort
  selector:
    app: payroll-frontend
  ports:
  - port: 4200
    targetPort: 4200
    nodePort: 32420